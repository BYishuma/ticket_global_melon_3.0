<fieldset>

	<legend>延迟设置</legend>
	<div class="form-row">
	    <label for="fixed-delay">新增必要延迟(ms):</label>
	    <input type="number" id="fixed-delay" name="fixed-delay" value="0" min="0" max="9999">
	</div>
	</fieldset>
    <legend>演唱会信息</legend>
    <div class="form-row">
        <label for="concert-name">演唱会名称:</label>
        <input type="text" id="concert-name" name="concert-name" placeholder="输入演唱会名称">
    </div>
    <div class="form-row">
        <label for="concert-id">演唱会ID:</label>
        <input type="text" id="concert-id" name="concert-id" placeholder="输入6位数字演唱会ID">
    </div>
    <div class="form-row">
        <label for="nb-ticket">购票数量:</label>
        <select name="ticket" id="ticket">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
    </div>
    <div class="form-row">
		<label for="date">日期:</label>
            <input type="date" id="date" name="date">
        </div>
    <div class="form-row">
		<label for="time">开演时间（KST）:</label>
            <input type="time" id="time" name="time">
        </div>
    </div>
    <div class="form-row">
        <label for="section">拟选区域:</label>
        <input type="text" id="section" name="section" placeholder="输入拟选择区域 (e.g: A,B,C)">
    </div>
</fieldset>
